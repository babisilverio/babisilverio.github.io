<section class="section experiencia-section">
  <div class="section-header">
    <h2>
      <i class="fas fa-briefcase"></i>
      Experiência Profissional
    </h2>
  </div>

  <div class="experiencias-container">
    @for (exp of experiencias; track exp.cargo; let last = $last) {
      <div class="experiencia-item">
        <div class="experiencia-header">
          <h3 class="cargo">{{ exp.cargo }}</h3>
          <span class="periodo">{{ exp.periodo }}</span>
        </div>

        <h4 class="empresa">
          <i class="fas fa-building"></i>
          {{ exp.empresa }}
        </h4>

        <p class="descricao">{{ exp.descricao }}</p>

        <div class="tecnologias">
          @for (tech of exp.tecnologias; track tech) {
            <span class="tecnologia">
              {{ tech }}
            </span>
          }
        </div>

        @if (!last) {
          <div class="divider"></div>
        }
      </div>
    }
  </div>
</section>
