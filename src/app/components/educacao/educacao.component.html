<section class="section educacao-section">
  <div class="section-header">
    <h2>
      <i class="fas fa-graduation-cap"></i>
      Educação
    </h2>
  </div>

  <div class="educacao-container">
    @for (edu of educacao; track edu.curso; let last = $last) {
      <div class="educacao-item">
        <div class="educacao-header">
          <h3 class="curso">{{ edu.curso }}</h3>
          <span class="periodo">{{ edu.periodo }}</span>
        </div>

        <h4 class="instituicao">
          <i class="fas fa-university"></i>
          {{ edu.instituicao }}
        </h4>

        @if (edu.descricao) {
          <p class="descricao">{{ edu.descricao }}</p>
        }

        @if (!last) {
          <div class="divider"></div>
        }
      </div>
    }
  </div>
</section>
